<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy — defence in depth.
      Должен совпадать с заголовком, который выставляется в src/index.ts через
      session.defaultSession.webRequest.onHeadersReceived. Если меняешь policy
      здесь — поменяй и там, иначе CSP не будет работать одинаково в dev / prod.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://ads-tracker-production.up.railway.app; img-src 'self' data: https:; script-src 'self'"
    />
    <title>Ads Tracker</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
