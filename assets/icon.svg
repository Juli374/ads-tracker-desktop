<?xml version="1.0" encoding="UTF-8"?>
<!-- KDPBook icon — Phase Q. Black squircle (rounded square, ~22% radius) +
     Playfair Display "K" in emerald-400. Matches sidebar wordmark style. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Black squircle background. macOS Sequoia rendering of standard
       rounded-square (rx ≈ 0.22 × width) — looks native in the dock. -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="#09090b"/>
  <!-- Subtle inner highlight (1px) for depth, like Apple's first-party icons. -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
  <!-- K letterform in Playfair Display 800. Emerald accent (#34d399 = emerald-400
       — one shade lighter than the wordmark emerald-500 so it pops against pure
       black). Centered with a slight lift (y=600) so the visual mass sits at
       optical center, not geometric. -->
  <text x="512" y="600"
        font-family="Playfair Display, Georgia, 'Times New Roman', serif"
        font-size="640"
        font-weight="800"
        text-anchor="middle"
        dominant-baseline="alphabetic"
        fill="#34d399"
        letter-spacing="-8">K</text>
</svg>
